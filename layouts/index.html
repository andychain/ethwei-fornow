<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}" />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      padding: 24px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 72px;
      height: auto;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .content {
      max-width: 820px;
    }

    .blockchain-gif {
      width: min(100%, 700px);
      margin-bottom: 36px;
      border-radius: 14px;
      opacity: 0.92;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.15;
      margin-bottom: 24px;
      color: #5BE06B;
      font-weight: 700;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.9;
      color: rgba(255,255,255,0.88);
      max-width: 720px;
      margin: 0 auto;
    }

    footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 640px) {
      .logo {
        width: 58px;
      }

      .blockchain-gif {
        margin-bottom: 28px;
      }

      p {
        line-height: 1.75;
      }
    }
  </style>
</head>

<body>
  <header>
    <img src="/images/logo.png" alt="Ethwei Logo" class="logo" />
  </header>

  <main>
    <div class="content">
      <img src="/images/blockchain.gif" alt="Blockchain Animation" class="blockchain-gif" />

      <h1>A boring blockchain is a good blockchain.</h1>

      <p>
        Ethwei is simple, secure and decentralized.<br />
        Under construction - stay tuned.
      </p>
    </div>
  </main>

  <footer>
    @2026 Ethwei
  </footer>
</body>
</html>
